# Generate the Xcode project on a Mac: `brew install xcodegen && xcodegen generate`
name: DapApp
options:
  bundleIdPrefix: com.antmanbuilder.dapapp
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # TODO: paste your 10-char Apple Developer Team ID here

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  DapApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DapApp
        excludes:
          - "Sounds/**"
      - path: DapApp/Sounds
        type: folder
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antmanbuilder.dapapp.DapApp
        INFOPLIST_FILE: DapApp/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: DapWatch Watch App
        embed: true
      - package: Supabase
        product: Supabase

  DapWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: DapWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antmanbuilder.dapapp.DapApp.watchkitapp
        INFOPLIST_FILE: DapWatch/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"

schemes:
  DapApp:
    build:
      targets:
        DapApp: all
        DapWatch Watch App: all
    run:
      config: Debug
